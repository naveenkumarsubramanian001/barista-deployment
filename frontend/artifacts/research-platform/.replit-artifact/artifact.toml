kind = "web"
previewPath = "/"
title = "AI Research Platform"
version = "1.0.0"
id = "artifacts/research-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18669
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/research-platform run dev"

[services.env]
PORT = "18669"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/research-platform", "run", "build"]
publicDir = "artifacts/research-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
