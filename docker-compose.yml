# ─── Barista CI — Docker Compose ────────────────────────────────────────────
# docker compose up --build
# Frontend → http://localhost:3000
# Backend  → http://localhost:8000
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── Backend (FastAPI + LangGraph) ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: barista_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - backend/.env        # Loads GROQ_API_KEY, TAVILY_API_KEY, etc.
    environment:
      # Override CORS so the nginx-served frontend is allowed
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://frontend:80
      # Keep SQLite files inside the container working directory
      - CHECKPOINTER_BACKEND=sqlite
      - CHECKPOINT_DB_PATH=/app/barista_checkpoints.sqlite
    volumes:
      # Persist SQLite databases across container restarts
      - backend_data:/app
    networks:
      - barista_net

  # ── Frontend (React + Vite → nginx) ───────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: barista_frontend
    restart: unless-stopped
    ports:
      - "3000:80"           # Access UI at http://localhost:3000
    depends_on:
      - backend
    networks:
      - barista_net

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  backend_data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  barista_net:
    driver: bridge
